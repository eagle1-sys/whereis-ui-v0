name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - deploy-eg1
      - deploy-eagl

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Cache Deno dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/deno
            ~/.deno
          key: ${{ runner.os }}-deno-${{ hashFiles('**/deno.lock') }}
          restore-keys: |
            ${{ runner.os }}-deno-

      - name: Install dependencies
        run: deno install

      - name: Build project
        run: deno task build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ github.ref_name == 'deploy-eg1' && secrets.CF_EG1_API_TOKEN || secrets.CF_EAGL_API_TOKEN }}
          accountId: ${{ github.ref_name == 'deploy-eg1' && secrets.CF_EG1_ACCOUNT_ID || secrets.CF_EAGL_ACCOUNT_ID }}
          command: deploy --keep-vars